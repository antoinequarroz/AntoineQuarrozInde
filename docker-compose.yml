services:
  web:
    build: .
    container_name: antoinequarroz-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    networks:
      - appnet

  caddy:
    image: caddy:2-alpine
    container_name: antoinequarroz-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
